<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="ogGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feFlood flood-color="#00FF88" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="ogGreenShift" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="bgVignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0c1020"/>
      <stop offset="100%" stop-color="#06080F"/>
    </radialGradient>
    <pattern id="gridPattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <line x1="60" y1="0" x2="60" y2="60" stroke="#00FF88" stroke-width="0.3" opacity="0.06"/>
      <line x1="0" y1="60" x2="60" y2="60" stroke="#00FF88" stroke-width="0.3" opacity="0.06"/>
    </pattern>
    <pattern id="chartDots" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="60" cy="60" r="1" fill="#00FF88" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgVignette)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#gridPattern)"/>
  <rect width="1200" height="630" fill="url(#chartDots)"/>

  <!-- Subtle chart line in background -->
  <polyline points="0,450 100,430 200,445 300,380 400,400 500,350 600,320 700,340 800,280 900,300 1000,250 1100,270 1200,220"
            fill="none" stroke="#00FF88" stroke-width="1" opacity="0.05"/>
  <polyline points="0,480 150,470 300,490 450,440 600,460 750,410 900,430 1050,380 1200,400"
            fill="none" stroke="#6366F1" stroke-width="0.8" opacity="0.04"/>

  <!-- Decorative corner accents -->
  <line x1="40" y1="40" x2="100" y2="40" stroke="#00FF88" stroke-width="1" opacity="0.15"/>
  <line x1="40" y1="40" x2="40" y2="100" stroke="#00FF88" stroke-width="1" opacity="0.15"/>
  <line x1="1160" y1="590" x2="1100" y2="590" stroke="#00FF88" stroke-width="1" opacity="0.15"/>
  <line x1="1160" y1="590" x2="1160" y2="530" stroke="#00FF88" stroke-width="1" opacity="0.15"/>

  <!-- Signal icon (larger version) -->
  <g transform="translate(370, 220)" filter="url(#ogGlow)">
    <polyline points="0,80 18,68 34,76 50,32 66,55 82,12 98,44"
              fill="none" stroke="url(#ogGreenShift)" stroke-width="3.5"
              stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="82" cy="12" r="5" fill="#00FF88" opacity="0.9"/>
    <circle cx="82" cy="12" r="10" fill="#00FF88" opacity="0.1"/>
  </g>

  <!-- RnG text -->
  <text x="478" y="305" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-size="80" font-weight="800" letter-spacing="-3" filter="url(#ogGlow)">
    <tspan fill="#00FF88">RnG</tspan>
  </text>

  <!-- crYptO text -->
  <text x="700" y="305" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-size="80" font-weight="800" letter-spacing="-3" fill="#F9FAFB">crYptO</text>

  <!-- Accent underline -->
  <rect x="478" y="320" width="230" height="2.5" rx="1.25" fill="url(#ogGreenShift)" opacity="0.4"/>

  <!-- Tagline -->
  <text x="600" y="385" text-anchor="middle"
        font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-size="22" font-weight="500" letter-spacing="6" fill="#9CA3AF">
    Web3  |  DeFi  |  Trading
  </text>

  <!-- Bottom accent line -->
  <rect x="480" y="410" width="240" height="1" rx="0.5" fill="#6366F1" opacity="0.2"/>
</svg>