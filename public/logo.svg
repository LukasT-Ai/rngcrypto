<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#00FF88" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="greenShift" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="signalGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="50%" stop-color="#00FF88"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Signal/chart icon -->
  <g transform="translate(8, 18)" filter="url(#softGlow)">
    <polyline points="0,50 12,42 22,48 32,20 42,35 52,8 62,28"
              fill="none" stroke="url(#signalGrad)" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="52" cy="8" r="3" fill="#00FF88" opacity="0.9"/>
    <circle cx="52" cy="8" r="6" fill="#00FF88" opacity="0.15"/>
  </g>

  <!-- RnG text with glow -->
  <text x="80" y="72" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="64" font-weight="800" letter-spacing="-2" filter="url(#softGlow)">
    <tspan fill="#00FF88">RnG</tspan>
  </text>

  <!-- crYptO text -->
  <text x="252" y="72" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="64" font-weight="800" letter-spacing="-2" fill="#F9FAFB">crYptO</text>

  <!-- Subtle underline accent -->
  <rect x="80" y="80" width="180" height="2" rx="1" fill="url(#greenShift)" opacity="0.5"/>
</svg>